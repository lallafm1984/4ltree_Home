<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MelodyGen - Feature Graphic</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
  <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Pretendard', 'system-ui', 'sans-serif'],
          },
        },
      },
    }
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Pretendard', system-ui, sans-serif;
      background: #080a12;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .banner {
      width: 1024px;
      height: 500px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #0c0f1a 0%, #111631 30%, #1a1040 60%, #131025 100%);
    }

    .noise-overlay {
      position: absolute;
      inset: 0;
      z-index: 50;
      pointer-events: none;
      opacity: 0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    }

    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.5;
    }

    .gradient-text {
      background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 50%, #ef4444 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .phone-frame {
      border-radius: 18px;
      box-shadow:
        0 0 0 2px rgba(255,255,255,0.08),
        0 20px 40px -8px rgba(0,0,0,0.5),
        0 0 60px -15px rgba(99,102,241,0.12);
      overflow: hidden;
    }

    .phone-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
      display: block;
    }

    .category-icon {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.75);
    }
  </style>
</head>
<body>

  <div class="banner">
    <div class="noise-overlay"></div>

    <!-- Ambient glow orbs -->
    <div class="glow-orb" style="width: 300px; height: 300px; background: rgba(99,102,241,0.2); top: -80px; left: -60px;"></div>
    <div class="glow-orb" style="width: 250px; height: 250px; background: rgba(245,158,11,0.12); bottom: -60px; right: 200px;"></div>
    <div class="glow-orb" style="width: 200px; height: 200px; background: rgba(168,85,247,0.1); top: 50px; right: -40px;"></div>

    <!-- Content layer -->
    <div style="position: relative; z-index: 10; height: 100%; display: flex; align-items: center; padding: 0 60px;">

      <!-- Left: Text content -->
      <div style="flex: 1; max-width: 440px;">

        <!-- Logo + brand -->
        <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 24px;">
          <img src="/img/logo.jpg" alt="4L Tree" style="width: 44px; height: 44px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);">
          <div>
            <div style="font-size: 20px; font-weight: 700; color: #fff; letter-spacing: -0.01em;">MelodyGen</div>
            <div style="font-size: 11px; color: rgba(255,255,255,0.35); font-weight: 500; letter-spacing: 0.04em;">by 4L TREE</div>
          </div>
        </div>

        <!-- Headline -->
        <h1 style="font-size: 48px; font-weight: 800; line-height: 1.15; color: #fff; letter-spacing: -0.03em; word-break: keep-all;">
          음악의 귀를<br>
          <span class="gradient-text">열다</span>
        </h1>

        <p style="margin-top: 18px; font-size: 17px; color: rgba(255,255,255,0.45); line-height: 1.6; font-weight: 400; word-break: keep-all;">
          6가지 청음 훈련으로 당신의<br>음악적 감각을 깨워보세요
        </p>

        <!-- Category pills -->
        <div style="margin-top: 28px; display: flex; gap: 8px; flex-wrap: wrap;">
          <div class="category-icon">
            <iconify-icon icon="solar:music-note-2-bold" style="color: #818cf8; font-size: 15px;"></iconify-icon>
            선율
          </div>
          <div class="category-icon">
            <iconify-icon icon="solar:sledgehammer-bold" style="color: #fbbf24; font-size: 15px;"></iconify-icon>
            리듬
          </div>
          <div class="category-icon">
            <iconify-icon icon="solar:transfer-vertical-bold" style="color: #34d399; font-size: 15px;"></iconify-icon>
            음정
          </div>
          <div class="category-icon">
            <iconify-icon icon="solar:layers-bold" style="color: #a855f7; font-size: 15px;"></iconify-icon>
            화성
          </div>
          <div class="category-icon">
            <iconify-icon icon="solar:key-bold" style="color: #fb7185; font-size: 15px;"></iconify-icon>
            조성
          </div>
          <div class="category-icon">
            <iconify-icon icon="solar:document-medicine-bold" style="color: #22d3ee; font-size: 15px;"></iconify-icon>
            2성부
          </div>
        </div>
      </div>

      <!-- Right: Phone mockups -->
      <div style="flex: 1; display: flex; align-items: center; justify-content: center; position: relative; height: 100%;">

        <!-- Main screen (center, front) -->
        <div class="phone-frame" style="width: 200px; height: 400px; position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); z-index: 3;">
          <img src="/img/main.webp" alt="메인 화면">
          <div style="position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 40%); pointer-events: none;"></div>
        </div>

        <!-- Melody screen (left, back) -->
        <div class="phone-frame" style="width: 160px; height: 330px; position: absolute; left: 10%; top: 50%; transform: translateY(-48%) rotate(-6deg); z-index: 1; opacity: 0.7;">
          <img src="/img/melody.webp" alt="선율 받아쓰기">
          <div style="position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 40%); pointer-events: none;"></div>
        </div>

        <!-- Daily screen (right, back) -->
        <div class="phone-frame" style="width: 160px; height: 330px; position: absolute; right: 2%; top: 50%; transform: translateY(-48%) rotate(6deg); z-index: 1; opacity: 0.7;">
          <img src="/img/daily.webp" alt="일일 목표">
          <div style="position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, transparent 40%); pointer-events: none;"></div>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
